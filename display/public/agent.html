<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MegaCorp · Manager Profile</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #1c3a64; --navy-2: #2c5896; --navy-text: #ffffff;
      --bg: #f4f6fa; --panel: #ffffff; --panel-head: #dce9f5;
      --border: #c8d6e5; --border-2: #aab9c9;
      --text: #2c3e50; --text-muted: #7a8b99; --text-faint: #9aaab8;
      --success: #27ae60; --warning: #d68910; --danger: #c0392b;
      --shadow: 0 1px 4px rgba(28,58,100,0.08);
    }
    html, body { font-family: Calibri, "Segoe UI", Arial, sans-serif; font-size: 14px; color: var(--text); background: var(--bg); min-height: 100vh; line-height: 1.5; }
    a { color: #2471a3; }

    .exec-banner { background: linear-gradient(180deg, var(--navy) 0%, var(--navy-2) 100%); color: var(--navy-text); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #f1c40f; }
    .brand-mark { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .brand-mark::before { content: "▸ "; color: #f1c40f; }
    .nav-links a { color: rgba(255,255,255,0.85); margin-left: 16px; text-decoration: none; font-size: 13px; letter-spacing: 0.4px; }
    .nav-links a:hover { color: #ffffff; text-decoration: underline; }

    .layout {
      max-width: 1100px;
      margin: 28px auto 60px;
      padding: 0 24px;
      display: grid;
      /* Left column (compressed): manager profile — reference info.
         Right column (wide): coach panel + recent activity — what the
         coach actually acts on. */
      grid-template-columns: 400px 1fr;
      gap: 24px;
    }
    @media (max-width: 880px) { .layout { grid-template-columns: 1fr; } }

    /* Directive-alignment badges per recent action so the coach can scan
       "did Brenda listen this time?" without reading every reasoning quote. */
    .align-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-left: 6px;
      vertical-align: middle;
    }
    .align-badge.followed { background: #d4f4dd; color: #186a3b; border: 1px solid #74c47e; }
    .align-badge.tilted   { background: #fef5e7; color: #936300; border: 1px solid #f1c40f; }
    .align-badge.defied   { background: #fadbd8; color: #922b21; border: 1px solid #e8786a; }
    .activity-directive {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 4px 8px;
      background: rgba(0,0,0,0.025);
      border-left: 2px solid var(--border);
      border-radius: 2px;
    }
    .activity-directive .label { font-weight: 700; color: var(--text); margin-right: 4px; }

    .panel { background: var(--panel); border: 1px solid var(--border); box-shadow: var(--shadow); }
    .panel-head { background: var(--panel-head); color: var(--navy); padding: 10px 16px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
    .panel-body { padding: 18px 20px; }

    .agent-header { display: flex; flex-direction: column; gap: 14px; align-items: flex-start; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .agent-portrait {
      width: 100%;
      max-width: 380px;
      flex-shrink: 0;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      background: #ecf0f1;
    }
    .agent-portrait img { width: 100%; height: auto; display: block; }
    .agent-header-text { display: flex; flex-direction: column; gap: 4px; }
    .agent-name { font-size: 28px; color: var(--navy); font-weight: 700; letter-spacing: -0.3px; line-height: 1.1; }
    .agent-title { color: var(--text-muted); font-size: 14px; letter-spacing: 0.3px; }
    .agent-id { font-family: monospace; font-size: 11px; color: var(--text-faint); margin-top: 4px; }

    /* 2×2 grid (Prestige + Budget on top, Rank + Allies below). Was a single
       row of 4 but the narrower right-column profile (320px) caused them
       to overflow the panel. */
    .stat-strip { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 18px; }
    .stat-tile { background: #f8fafc; border: 1px solid var(--border); padding: 10px 12px; text-align: center; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--navy); font-variant-numeric: tabular-nums; }
    .stat-suffix { font-size: 11px; color: var(--text-muted); }

    .traits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-bottom: 16px; }
    .trait { display: flex; align-items: center; gap: 10px; }
    .trait-name { min-width: 80px; font-size: 12px; color: var(--text); font-weight: 600; }
    .trait-bar { flex: 1; height: 8px; background: #ecf0f1; border-radius: 4px; overflow: hidden; position: relative; }
    .trait-bar > div { height: 100%; background: var(--navy-2); }
    .trait.aggression .trait-bar > div { background: var(--danger); }
    .trait.greed .trait-bar > div { background: var(--warning); }
    .trait.caution .trait-bar > div { background: var(--success); }
    .trait.loyalty .trait-bar > div { background: var(--navy-2); }
    .trait-value { font-size: 11px; color: var(--text-muted); min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; }

    .backstory, .quirk, .speech-style {
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .backstory b, .quirk b, .speech-style b {
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-size: 11px;
      display: block;
      margin-bottom: 4px;
    }
    .quirk i { color: var(--text); }

    .activity-list { display: flex; flex-direction: column; gap: 0; max-height: 420px; overflow-y: auto; }
    .activity-row { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; }
    .activity-row:last-child { border-bottom: 0; }
    /* Inbound row — something done *to* this manager. Red left edge + tinted
       background so coaches can scan "what hit me" without reading every row. */
    .activity-row.inbound { background: #fdf3f2; border-left: 3px solid #c0392b; }
    .activity-row.inbound .activity-action { color: #922b21; }
    .activity-direction {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 1px 6px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .activity-direction.in  { background: #fadbd8; color: #922b21; }
    .activity-direction.out { background: #e8f0f8; color: var(--navy); }
    .activity-tick { font-family: monospace; color: var(--text-faint); font-size: 10px; margin-bottom: 2px; }
    .activity-action { font-weight: 600; color: var(--navy); }
    .activity-actor { font-weight: 700; color: #922b21; }
    .activity-outcome { color: var(--text); margin-top: 2px; line-height: 1.4; }
    .activity-reasoning { color: var(--text-muted); font-style: italic; margin-top: 4px; padding-top: 4px; border-top: 1px dashed var(--border); font-size: 11px; line-height: 1.4; }
    .activity-prestige { display: inline-block; padding: 1px 6px; font-size: 10px; font-weight: 700; border-radius: 2px; margin-left: 6px; }
    .activity-prestige.up { background: #d4f4dd; color: var(--success); }
    .activity-prestige.down { background: #fadbd8; color: var(--danger); }

    .claim-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 3px solid #f1c40f;
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .claim-box h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--navy); margin-bottom: 12px; }
    .claim-box label { display: block; font-size: 12px; color: var(--text-muted); margin-top: 12px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.6px; }
    .claim-box input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-2); border-radius: 2px; font-size: 14px; font-family: inherit; }
    .claim-box input:focus { outline: 2px solid var(--navy-2); border-color: var(--navy-2); }
    .claim-btn { width: 100%; margin-top: 18px; background: var(--navy); color: #ffffff; padding: 12px; border: 0; font-family: inherit; font-size: 14px; font-weight: 600; letter-spacing: 0.6px; cursor: pointer; }
    .claim-btn:hover { background: var(--navy-2); }
    .claim-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .claim-msg { margin-top: 12px; padding: 10px 14px; font-size: 13px; }
    .claim-msg.error { background: #fadbd8; color: var(--danger); border-left: 3px solid var(--danger); }
    .claim-msg.success { background: #d4f4dd; color: var(--success); border-left: 3px solid var(--success); }

    .already-claimed {
      padding: 18px;
      background: #fef5e7;
      color: var(--warning);
      border-left: 3px solid var(--warning);
      font-size: 13px;
    }

    .coach-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 3px solid #f1c40f;
      box-shadow: var(--shadow);
      padding: 18px 20px;
      font-size: 13px;
    }
    .coach-box h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--navy); margin-bottom: 8px; }
    .coach-box .coach-state { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.5; }
    .coach-box .coach-state.open { color: var(--success); }
    .coach-box .coach-state.locked { color: var(--text-muted); }
    .coach-box .current-directive {
      background: #fef5e7;
      padding: 10px 12px;
      border-left: 3px solid #f1c40f;
      color: #1c3a64;
      margin-bottom: 14px;
      font-size: 15px;
      line-height: 1.5;
    }
    .coach-box .current-directive .label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--navy-2);
      margin-bottom: 4px;
    }
    .coach-box .current-directive .text { font-style: italic; }
    /* Directive consideration pill — sits between the "Life-coaching is open"
       state line and the current-directive quote. Tells the coach whether
       their current directive has already been read by the manager (safe to
       write the next one) or is still queued for this cycle. */
    .directive-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 2px;
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 10px;
      letter-spacing: 0.2px;
    }
    .directive-status.considered {
      background: #e8f6ef;
      border-left: 3px solid #27ae60;
      color: #1e6b3f;
    }
    .directive-status.pending {
      background: #fdf2e2;
      border-left: 3px solid #d68910;
      color: #8a5a08;
    }
    .directive-status .icon { font-size: 14px; flex-shrink: 0; }
    .coach-box textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-2);
      border-radius: 2px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      min-height: 80px;
      box-sizing: border-box;
    }
    .coach-box textarea:focus { outline: 2px solid var(--navy-2); border-color: var(--navy-2); }
    .coach-box .coach-counter {
      font-size: 11px;
      color: var(--text-faint);
      text-align: right;
      margin-top: 4px;
    }
    /* Coaching hints — Suggested Actions + Strategic Directives. Rendered
       inside the coach-box, above the directive textarea. Click any chip
       or list item to populate the textarea. */
    .coaching-hints { margin-bottom: 14px; }
    .coaching-hints .hint-section { margin-bottom: 12px; }
    .coaching-hints .hint-section:last-child { margin-bottom: 0; }
    .coaching-hints .hint-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .coaching-hints .hint-sublabel {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0.3px;
      color: var(--text-muted);
      font-size: 10px;
      margin-left: 4px;
    }
    .coaching-hints .hint-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .coaching-hints .hint-action {
      background: #dce9f5;
      color: var(--navy);
      border: 1px solid #b8d0e8;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .coaching-hints .hint-action:hover {
      background: var(--navy-2);
      color: #fff;
      border-color: var(--navy-2);
    }
    .coaching-hints .hint-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .coaching-hints .hint-directive {
      background: #fffaf0;
      border: 1px solid #f0e1c0;
      border-left: 3px solid #d4a02f;
      padding: 8px 12px;
      margin-bottom: 6px;
      font-size: 12px;
      line-height: 1.4;
      cursor: pointer;
      transition: background 0.12s;
      border-radius: 2px;
    }
    .coaching-hints .hint-directive:hover { background: #fef5e0; }
    .coaching-hints .hint-directive:last-child { margin-bottom: 0; }
    .coaching-hints .hint-text { color: var(--text); }
    .coaching-hints .hint-reason {
      color: var(--text-muted);
      font-style: italic;
      font-size: 10px;
      margin-top: 3px;
      letter-spacing: 0.2px;
    }

    .coach-box .coach-buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .coach-box button {
      flex: 1;
      padding: 9px;
      border: 0;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .coach-box .coach-save { background: var(--navy); color: #fff; }
    .coach-box .coach-save:hover { background: var(--navy-2); }
    .coach-box .coach-clear { background: #ecf0f1; color: var(--text); border: 1px solid var(--border-2); }
    .coach-box .coach-clear:hover { background: #d5dbdb; }
    .coach-box button:disabled { opacity: 0.5; cursor: not-allowed; }
    .coach-msg { margin-top: 10px; font-size: 12px; line-height: 1.4; }
    /* Onboarding modal — first-time-claim welcome flow. */
    .onboarding-backdrop {
      position: fixed; inset: 0;
      background: rgba(28,58,100,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 24px;
    }
    .onboarding-backdrop[hidden] { display: none; }
    .onboarding-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 4px solid #f1c40f;
      box-shadow: 0 8px 32px rgba(28,58,100,0.25);
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      padding: 32px 36px 28px;
    }
    .onboarding-skip {
      position: absolute;
      top: 12px; right: 16px;
      background: transparent;
      border: 0;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: inherit;
    }
    .onboarding-skip:hover { color: var(--navy); }
    .onboarding-progress {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
    }
    .onboarding-progress .dot {
      flex: 1;
      height: 4px;
      background: #ecf0f1;
      border-radius: 2px;
    }
    .onboarding-progress .dot.active { background: #f1c40f; }
    .onboarding-progress .dot.done { background: var(--navy-2); }
    .onboarding-content h2 {
      color: var(--navy);
      font-size: 22px;
      margin-bottom: 12px;
      line-height: 1.2;
    }
    .onboarding-content p {
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 12px;
    }
    .onboarding-content p:last-child { margin-bottom: 0; }
    .onboarding-content .persona-card {
      background: #f4f6fa;
      border: 1px solid var(--border);
      padding: 14px 16px;
      margin: 14px 0;
      font-size: 13px;
    }
    .onboarding-content .persona-card .pc-name {
      font-weight: 700;
      color: var(--navy);
      font-size: 15px;
      margin-bottom: 4px;
    }
    .onboarding-content .persona-card .pc-title {
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .onboarding-content .persona-card .pc-quirk {
      font-style: italic;
      color: var(--text);
      font-size: 12px;
      border-top: 1px dashed var(--border);
      padding-top: 8px;
      margin-top: 8px;
    }
    .onboarding-content ul {
      margin: 8px 0 12px 22px;
      font-size: 14px;
      line-height: 1.7;
    }
    .onboarding-content ul li { margin-bottom: 4px; }
    .onboarding-content code {
      background: #f4f6fa;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 12px;
      border-radius: 2px;
    }
    .onboarding-content .alignment-row {
      display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; font-size: 13px;
    }
    .onboarding-content .alignment-row b { min-width: 64px; }
    .onboarding-content .followed { color: #186a3b; }
    .onboarding-content .tilted   { color: #936300; }
    .onboarding-content .defied   { color: #922b21; }
    .onboarding-content .page-link {
      display: block;
      background: #f4f6fa;
      border: 1px solid var(--border);
      padding: 10px 14px;
      margin-bottom: 8px;
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
    }
    .onboarding-content .page-link:hover { background: #ecf0f1; }
    .onboarding-content .page-link b { color: var(--navy); }
    .onboarding-content .page-link .pl-desc { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
    .onboarding-nav {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .onboarding-btn {
      padding: 10px 22px;
      border: 0;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      cursor: pointer;
    }
    .onboarding-btn.next {
      background: var(--navy);
      color: #fff;
    }
    .onboarding-btn.next:hover { background: var(--navy-2); }
    .onboarding-btn.back {
      background: #ecf0f1;
      color: var(--text);
      border: 1px solid var(--border-2);
    }
    .onboarding-btn.back:hover { background: #d5dbdb; }
    .onboarding-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header class="exec-banner">
    <div class="brand-mark">MegaCorp Inc.</div>
    <div class="nav-links">
      <a href="/" id="dashboard-link">📊 Dashboard</a>
      <a href="/intro.html">🧑‍💼 Be a Life Coach</a>
      <a href="/handbook.html">📖 Handbook</a>
      <a href="/directives.html">🎙 Life Coaching</a>
    </div>
  </header>

  <!-- Onboarding modal — fires after a successful claim. localStorage flag
       (qa.onboarded.<agentId>) ensures it only shows once per coach per
       browser. Five steps, Next/Back nav, Skip on every step. -->
  <div id="onboarding-modal" class="onboarding-backdrop" hidden>
    <div class="onboarding-card">
      <button class="onboarding-skip" type="button" id="onboarding-skip" title="Close onboarding">Skip Onboarding</button>
      <div class="onboarding-progress" id="onboarding-progress"></div>
      <div class="onboarding-content" id="onboarding-content"></div>
      <div class="onboarding-nav">
        <button type="button" class="onboarding-btn back" id="onboarding-back" disabled>← Back</button>
        <button type="button" class="onboarding-btn next" id="onboarding-next">Next →</button>
      </div>
    </div>
  </div>

  <main class="layout">
    <aside class="panel">
      <div class="panel-head">Manager Profile</div>
      <div class="panel-body" id="profile-body">
        <div style="text-align:center;padding:40px 0;color:var(--text-faint)">Loading…</div>
      </div>
    </aside>

    <section id="side-col" style="display:flex;flex-direction:column;gap:16px;">
      <div id="claim-area"></div>
      <div id="coach-area"></div>
      <section class="panel">
        <div class="panel-head">Recent Activity</div>
        <div class="activity-list" id="activity-list"></div>
      </section>
    </section>
  </main>

  <script>
    const ORCHESTRATOR_BASE = window.ORCHESTRATOR_BASE
      || new URLSearchParams(location.search).get('orchestrator')
      || 'https://orchestrator.briana-761.workers.dev';

    function escape(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    const params = new URLSearchParams(location.search);
    const agentId = params.get('id');

    // Carry the agent id through to the dashboard so the personalized
    // gold highlight (?coach=<id>) follows the coach without them
    // having to remember to add the param.
    if (agentId) {
      const dashLink = document.getElementById('dashboard-link');
      if (dashLink) dashLink.href = '/?coach=' + encodeURIComponent(agentId);
    }

    if (!agentId) {
      document.getElementById('profile-body').innerHTML =
        '<p>Missing agent id. <a href="/intro.html">← go back</a></p>';
    } else {
      load();
    }

    // Tracks the last-seen coaching-open state so the poller below can re-render
    // the coach panel ONLY when the game transitions setup → running. Avoids
    // wiping a coach's in-progress textarea text on every poll.
    let lastCoachWindowOpen = null;
    let lastGameStatus = null;

    async function load() {
      const url = `${ORCHESTRATOR_BASE}/api/agent/${encodeURIComponent(agentId)}`;
      const res = await fetch(url);
      if (res.status === 404) {
        document.getElementById('profile-body').innerHTML =
          '<p>No such manager. <a href="/intro.html">← back to roster</a></p>';
        return;
      }
      if (!res.ok) {
        document.getElementById('profile-body').innerHTML =
          `<p>Failed to load (HTTP ${res.status}). Try again in a moment.</p>`;
        return;
      }
      const a = await res.json();
      renderProfile(a);
      renderActivity(a.recentActions || [], a.inboundEvents || []);
      renderClaim(a);
      renderCoach(a);
      syncDirectiveStatus(a);
      await refreshCoachingHints();
      lastCoachWindowOpen = !!(a.coachingWindow && a.coachingWindow.open);
      lastGameStatus = a.gameStatus;
    }

    // Poll every 5s for game-state changes so the coaching panel auto-unblocks
    // when the game transitions to running (was: coach had to refresh manually).
    // Only re-renders the coach panel when something materially changes; preserves
    // textarea content during normal gameplay.
    async function pollAgentState() {
      if (document.visibilityState === 'hidden') return;
      try {
        const r = await fetch(`${ORCHESTRATOR_BASE}/api/agent/${encodeURIComponent(agentId)}`);
        if (!r.ok) return;
        const a = await r.json();
        // Profile + activity refresh every tick — no user input there to clobber.
        renderProfile(a);
        renderActivity(a.recentActions || [], a.inboundEvents || []);
        // Considered/Pending pill must refresh every poll so the coach sees
        // it flip the moment their manager acts. Targeted DOM update — leaves
        // the surrounding coach-box (textarea, password) untouched.
        syncDirectiveStatus(a);
        // Coach panel re-renders only on a window/status flip — otherwise it'd
        // wipe the directive textarea + password the coach is mid-typing.
        const isOpen = !!(a.coachingWindow && a.coachingWindow.open);
        const status = a.gameStatus;
        if (isOpen !== lastCoachWindowOpen || status !== lastGameStatus) {
          renderCoach(a);
          syncDirectiveStatus(a);
          lastCoachWindowOpen = isOpen;
          lastGameStatus = status;
        }
      } catch { /* network blip; try again next tick */ }
      // Hints refresh on every poll so suggestions track the agent's state
      // as it evolves (balance shifts, status effects, new Documented targets).
      await refreshCoachingHints();
    }
    setInterval(pollAgentState, 5000);

    // ============================================================
    // Coaching hints — server picks Suggested Actions (2 atomic) +
    // Strategic Directives (3-4 combo plays) based on the manager's
    // live state. Clicking either populates the directive textarea.
    // ============================================================
    async function refreshCoachingHints() {
      const slot = document.getElementById('coaching-hints-slot');
      if (!slot) return; // coach panel might be closed/uninitialized
      try {
        const r = await fetch(`${ORCHESTRATOR_BASE}/api/coaching-hints?agentId=${encodeURIComponent(agentId)}`);
        if (!r.ok) return;
        const { suggestedActions = [], strategicDirectives = [] } = await r.json();
        if (suggestedActions.length === 0 && strategicDirectives.length === 0) {
          slot.innerHTML = '';
          return;
        }
        const actionChips = suggestedActions.map((a) => `
          <button type="button" class="hint-action" data-text="${escape(a.name)}" title="${escape(a.oneLiner)}">
            ${escape(a.name)}
          </button>
        `).join('');
        const directiveList = strategicDirectives.map((d) => `
          <li class="hint-directive" data-text="${escape(d.text)}">
            <div class="hint-text">${escape(d.text)}</div>
            <div class="hint-reason">${escape(d.reason)}</div>
          </li>
        `).join('');
        slot.innerHTML = `
          <div class="coaching-hints">
            ${suggestedActions.length > 0 ? `
              <div class="hint-section">
                <div class="hint-label">⚡ Suggested Actions <span class="hint-sublabel">(click to pre-fill)</span></div>
                <div class="hint-chips">${actionChips}</div>
              </div>
            ` : ''}
            ${strategicDirectives.length > 0 ? `
              <div class="hint-section">
                <div class="hint-label">🎯 Strategic Directives <span class="hint-sublabel">(click to pre-fill)</span></div>
                <ul class="hint-list">${directiveList}</ul>
              </div>
            ` : ''}
          </div>
        `;
        // Wire up click → populate textarea
        const input = document.getElementById('coach-input');
        if (input) {
          slot.querySelectorAll('.hint-action').forEach((btn) => {
            btn.addEventListener('click', () => {
              const text = btn.getAttribute('data-text') || '';
              input.value = text;
              input.focus();
              document.getElementById('coach-len').textContent = String(input.value.length);
            });
          });
          slot.querySelectorAll('.hint-directive').forEach((li) => {
            li.addEventListener('click', () => {
              const text = li.getAttribute('data-text') || '';
              input.value = text;
              input.focus();
              document.getElementById('coach-len').textContent = String(input.value.length);
            });
          });
        }
      } catch { /* hints are best-effort; don't break the coaching flow */ }
    }

    function renderProfile(a) {
      const traits = a.traits || { aggression: 0, greed: 0, caution: 0, loyalty: 0 };
      const statuses = (a.statusEffects || []).length > 0
        ? (a.statusEffects.map((s) => s.type.toUpperCase().replace(/_/g, ' '))).join(' · ')
        : 'NORMAL';

      const portraitUrl = `/images/${encodeURIComponent(a.name)}.png`;
      document.getElementById('profile-body').innerHTML = `
        <div class="agent-header">
          <div class="agent-portrait">
            <img src="${portraitUrl}" alt="${escape(a.name)}" onerror="this.parentElement.style.display='none'">
          </div>
          <div class="agent-header-text">
            <div class="agent-name">${escape(a.name)}</div>
            <div class="agent-title">${escape(a.title)}</div>
            <div class="agent-id">id: ${escape(a.id)} · <a href="${escape(a.explorerUrl)}" target="_blank" rel="noopener">stellar.expert ↗</a></div>
          </div>
        </div>

        <div class="stat-strip">
          <div class="stat-tile">
            <div class="stat-label">Prestige</div>
            <div class="stat-value">${a.prestige}</div>
          </div>
          <div class="stat-tile">
            <div class="stat-label">Budget</div>
            <div class="stat-value">$${Math.round(a.balance)}</div>
            <div class="stat-suffix">DLBR</div>
          </div>
          <div class="stat-tile">
            <div class="stat-label">Rank</div>
            <div class="stat-value">#${a.rank}</div>
            <div class="stat-suffix">of ${a.total}</div>
          </div>
          <div class="stat-tile">
            <div class="stat-label">Allies</div>
            <div class="stat-value">${(a.allies || []).length}</div>
          </div>
        </div>

        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;">Status</div>
        <div style="font-family:monospace;background:#f8fafc;padding:8px 12px;font-size:12px;margin-bottom:18px;border:1px solid var(--border);">${escape(statuses)}</div>

        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Personality Profile</div>
        <div class="traits-grid">
          ${traitRow('Aggression', 'aggression', traits.aggression)}
          ${traitRow('Greed', 'greed', traits.greed)}
          ${traitRow('Caution', 'caution', traits.caution)}
          ${traitRow('Loyalty', 'loyalty', traits.loyalty)}
        </div>

        ${a.backstory ? `<div class="backstory"><b>Backstory</b>${escape(a.backstory)}</div>` : ''}
        ${a.quirk ? `<div class="quirk"><b>Quirk</b><i>"${escape(a.quirk)}"</i></div>` : ''}
        ${a.speechStyle ? `<div class="speech-style"><b>Speech style</b>${escape(a.speechStyle)}</div>` : ''}
      `;
    }

    function traitRow(label, cls, val) {
      const v = Math.max(0, Math.min(100, val ?? 0));
      return `
        <div class="trait ${cls}">
          <div class="trait-name">${escape(label)}</div>
          <div class="trait-bar"><div style="width:${v}%"></div></div>
          <div class="trait-value">${v}</div>
        </div>`;
    }

    function renderActivity(actions, inbound) {
      const list = document.getElementById('activity-list');
      const outboundRows = (actions || []).map((a) => ({ ...a, _dir: 'out' }));
      const inboundRows = (inbound || []).map((e) => ({ ...e, _dir: 'in' }));
      const merged = outboundRows.concat(inboundRows);
      if (merged.length === 0) {
        list.innerHTML = '<div style="padding:18px;color:var(--text-faint);font-size:12px;">No recent activity yet.</div>';
        return;
      }
      // Newest first — coaches scan the top of the list to see "what just
      // happened with my last directive" or "what just got done to me."
      merged.sort((a, b) => b.tick - a.tick);
      list.innerHTML = merged.map((row) => {
        if (row._dir === 'in') return renderInboundRow(row);
        return renderOutboundRow(row);
      }).join('');
    }

    function renderOutboundRow(a) {
      const pc = a.prestigeChange;
      const prestigeBadge = pc > 0
        ? `<span class="activity-prestige up">+${pc}</span>`
        : pc < 0
          ? `<span class="activity-prestige down">${pc}</span>`
          : '';
      // Directive-alignment badge: LLM self-rated whether it followed, tilted
      // from, or defied the active directive at the time of action. Only
      // renders when a directive was actually in flight.
      const align = a.directiveAlignment;
      const alignBadge = align === 'followed'
        ? `<span class="align-badge followed" title="The agent followed your directive.">✓ Followed</span>`
        : align === 'tilted'
          ? `<span class="align-badge tilted" title="The agent did something related to your directive but flavored by their personality / situation.">〰 Tilted</span>`
          : align === 'defied'
            ? `<span class="align-badge defied" title="The agent ignored your directive and did their own thing.">✘ Defied</span>`
            : '';
      const directiveBlock = a.directiveAtAction
        ? `<div class="activity-directive"><span class="label">Directive:</span>"${escape(a.directiveAtAction)}"</div>`
        : '';
      return `
        <div class="activity-row">
          <div class="activity-tick">tick ${a.tick}</div>
          <div><span class="activity-direction out" title="Action your manager took">→ Out</span><span class="activity-action">${escape(a.actionType)}</span>${prestigeBadge}${alignBadge}</div>
          <div class="activity-outcome">${escape(a.outcome || '')}</div>
          ${a.reasoning ? `<div class="activity-reasoning">"${escape(a.reasoning)}"</div>` : ''}
          ${directiveBlock}
        </div>`;
    }

    function renderInboundRow(e) {
      const actionLabel = e.actionType || e.description || 'incoming';
      return `
        <div class="activity-row inbound">
          <div class="activity-tick">tick ${e.tick}</div>
          <div><span class="activity-direction in" title="Action another manager took against yours">← In</span><span class="activity-action">${escape(actionLabel)}</span><span style="color:var(--text-muted);"> from </span><span class="activity-actor">${escape(e.actorName || 'someone')}</span></div>
          ${e.description ? `<div class="activity-outcome">${escape(e.description)}</div>` : ''}
          ${e.reasoning ? `<div class="activity-reasoning">"${escape(e.reasoning)}"</div>` : ''}
        </div>`;
    }

    function renderClaim(a) {
      const area = document.getElementById('claim-area');
      if (a.claimed) {
        // In retreat mode anyone with the right password can release. Show
        // the release affordance whenever the game isn't actively running.
        const gameInProgress = a.gameStatus === 'running';
        let releaseSection = '';
        if (gameInProgress) {
          releaseSection = `<div style="margin-top:14px;padding-top:14px;border-top:1px solid #f1c40f;font-size:12px;color:var(--text-muted);">
              🔒 <b>Locked during active cycle.</b> Release reopens once the game halts or ends.
            </div>`;
        } else {
          releaseSection = `<div style="margin-top:14px;padding-top:14px;border-top:1px solid #f1c40f;">
              <details>
                <summary style="cursor:pointer;color:var(--warning);font-size:12px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;">Release this manager →</summary>
                <p style="font-size:12px;color:var(--text-muted);margin-top:10px;line-height:1.5;">
                  Enter the password you set at claim time. The slot reopens for someone else.
                </p>
                <form id="release-form" style="margin-top:8px;">
                  <input id="release-pw" type="password" required minlength="4" maxlength="128" placeholder="password"
                         style="width:100%;padding:8px 10px;border:1px solid var(--border-2);border-radius:2px;font-size:13px;font-family:inherit;">
                  <button id="release-submit" type="submit"
                          style="width:100%;margin-top:10px;background:var(--danger);color:#fff;padding:9px;border:0;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;cursor:pointer;">
                    Release ${escape(a.name)}
                  </button>
                  <div id="release-msg" style="margin-top:8px;font-size:12px;"></div>
                </form>
              </details>
            </div>`;
        }
        area.innerHTML = `
          <div class="already-claimed">
            <b>Already coached</b> by ${escape(a.claimedByName || 'a life coach')}.<br>
            <a href="/intro.html" style="color:var(--warning);">Pick another manager →</a>
            ${releaseSection}
          </div>`;
        if (!gameInProgress) {
          document.getElementById('release-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('release-pw').value;
            const btn = document.getElementById('release-submit');
            const msg = document.getElementById('release-msg');
            msg.style.color = 'var(--text-muted)';
            msg.textContent = 'Releasing…';
            btn.disabled = true;
            try {
              const r = await fetch(`${ORCHESTRATOR_BASE}/api/release`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ agentId: a.id, password }),
              });
              const data = await r.json();
              if (r.ok) {
                msg.style.color = 'var(--success)';
                msg.textContent = `Released. The slot is open again. Reloading…`;
                setTimeout(() => location.reload(), 1100);
              } else {
                msg.style.color = 'var(--danger)';
                msg.textContent = data.error || `Release failed (${r.status})`;
                btn.disabled = false;
              }
            } catch (err) {
              msg.style.color = 'var(--danger)';
              msg.textContent = 'Network error: ' + err.message;
              btn.disabled = false;
            }
          });
        }
        return;
      }
      area.innerHTML = `
        <div class="claim-box">
          <h3>Adopt ${escape(a.name.split(' ')[0])}</h3>
          <p style="font-size:12px;color:var(--text-muted);">
            Pick a password — you'll re-enter it each time you submit a directive. We'll email you updates as your manager makes their moves.
          </p>
          <form id="claim-form">
            <label>Your name</label>
            <input id="claim-name" type="text" required maxlength="80" placeholder="Briana Stahl">
            <label>Email</label>
            <input id="claim-email" type="email" required maxlength="200" placeholder="you@work.example">
            <label>Password</label>
            <input id="claim-pw" type="password" required minlength="4" maxlength="128" placeholder="anything 4+ characters">
            <label>Confirm password</label>
            <input id="claim-pw2" type="password" required minlength="4" maxlength="128" placeholder="repeat">
            <button class="claim-btn" type="submit" id="claim-submit">Claim ${escape(a.name)}</button>
            <div id="claim-msg"></div>
          </form>
        </div>`;

      document.getElementById('claim-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('claim-name').value.trim();
        const email = document.getElementById('claim-email').value.trim();
        const password = document.getElementById('claim-pw').value;
        const password2 = document.getElementById('claim-pw2').value;
        const btn = document.getElementById('claim-submit');
        const msg = document.getElementById('claim-msg');
        msg.className = '';
        msg.innerHTML = '';
        if (password !== password2) {
          msg.className = 'claim-msg error';
          msg.textContent = 'Passwords do not match.';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Submitting…';
        try {
          const r = await fetch(`${ORCHESTRATOR_BASE}/api/claim`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ agentId: a.id, name, email, password }),
          });
          const data = await r.json();
          if (r.ok) {
            // Persist the claim so all pages' Dashboard nav links can carry
            // the ?coach=<id> param automatically — without this, navigating
            // to the dashboard from intro/handbook/directives would lose the
            // gold-highlight context.
            try { localStorage.setItem('qa.myCoachedAgent', agentId); } catch {}
            // Cache password in sessionStorage so directive submissions don't
            // require re-typing. Per-tab scope, cleared when tab closes.
            try { sessionStorage.setItem(`qa.password.${agentId}`, password); } catch {}
            msg.className = 'claim-msg success';
            msg.innerHTML = `<div>Claim confirmed!</div>`;
            btn.textContent = 'Claimed';
            // Fire the onboarding modal for first-time coaches. The modal
            // walks through the game flow + coaching mechanics, then on
            // close reloads the page into the (now-claimed) coaching view.
            showOnboarding(a);
          } else {
            msg.className = 'claim-msg error';
            msg.textContent = data.error || `Claim failed (${r.status})`;
            btn.disabled = false;
            btn.textContent = `Claim ${a.name}`;
          }
        } catch (err) {
          msg.className = 'claim-msg error';
          msg.textContent = 'Network error: ' + err.message;
          btn.disabled = false;
          btn.textContent = `Claim ${a.name}`;
        }
      });
    }

    // Targeted update for the "Considered / Not yet considered" pill.
    // Lives inside the coach-box but refreshes on every poll independently
    // so it flips the moment the manager's tick fires — without touching
    // the textarea or password fields the coach is mid-typing into.
    function syncDirectiveStatus(a) {
      const slot = document.getElementById('directive-status-slot');
      if (!slot) return;
      const dirText = a.directive || '';
      const w = a.coachingWindow || { open: false };
      if (!dirText || !w.open) { slot.innerHTML = ''; return; }
      const considered = (a.recentActions || []).find(r => r.directiveAtAction === dirText);
      if (considered) {
        const cycle = Math.max(1, Math.ceil(considered.tick / 5));
        slot.innerHTML = `<div class="directive-status considered">`
                       + `<span class="icon">✓</span>`
                       + `<span>Considered at cycle ${cycle} (tick ${considered.tick}). Safe to write your next directive.</span>`
                       + `</div>`;
      } else {
        slot.innerHTML = `<div class="directive-status pending">`
                       + `<span class="icon">⏳</span>`
                       + `<span>Not yet considered — your manager reads it the next time they act this cycle.</span>`
                       + `</div>`;
      }
    }

    // ============================================================
    // Retreat-mode coaching: always-open. Anyone with the right password
    // can set or clear the directive at any tick during a running/halted
    // game. Directive persists until overwritten or DELETE'd. The current
    // directive is shown publicly (audience reads it on the directive
    // screen); the password is re-entered with every submission.
    // ============================================================
    function renderCoach(a) {
      const area = document.getElementById('coach-area');
      if (!a.claimed) { area.innerHTML = ''; return; }

      const w = a.coachingWindow || { open: false };
      const dirText = a.directive || '';
      const stateText = w.open
        ? `Life-coaching is open. Submit a directive any time — it persists until you overwrite it.`
        : a.gameStatus === 'ended'
          ? `Game ended. Directives cleared at end-of-game.`
          : a.gameStatus === 'setup'
            ? `Game hasn't started. Life-coaching opens when the first cycle does.`
            : `Life-coaching unavailable (game ${a.gameStatus}).`;
      const stateClass = w.open ? 'open' : 'locked';

      // "Has the manager read this directive yet?" pill is rendered in a
      // sentinel div and re-synced on every poll (separately from the coach
      // panel which only re-renders on window/status flips so it doesn't
      // wipe the textarea). See syncDirectiveStatus().
      const statusHtml = '<div id="directive-status-slot"></div>';

      area.innerHTML = `
        <div class="coach-box">
          <h3 style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
            <span>⏱ Life-coach ${escape(a.name.split(' ')[0])}</span>
            <button type="button" id="replay-onboarding"
              style="background:transparent;border:0;color:var(--navy-2);font-size:11px;text-transform:uppercase;letter-spacing:0.6px;cursor:pointer;font-family:inherit;text-decoration:underline;">
              👋 Show onboarding tour
            </button>
          </h3>
          <div class="coach-state ${stateClass}">${escape(stateText)}</div>
          ${statusHtml}
          ${dirText ? `<div class="current-directive"><div class="label">Current Directive</div><div class="text">"${escape(dirText)}"</div></div>` : ''}
          ${w.open ? `
            <div id="coaching-hints-slot"></div>
            <textarea id="coach-input" maxlength="280" placeholder="e.g. Go after Marcus. Hostile takeover his partnerships if you can."></textarea>
            <div class="coach-counter"><span id="coach-len">0</span>/280</div>
            <label style="display:block;font-size:12px;color:var(--text-muted);margin-top:10px;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.6px;">Password</label>
            <input id="coach-pw" type="password" minlength="4" maxlength="128" placeholder="password set at claim time"
                   style="width:100%;padding:10px 12px;border:1px solid var(--border-2);border-radius:2px;font-size:14px;font-family:inherit;">
            <div class="coach-buttons">
              <button class="coach-save" id="coach-save" type="button">Save Directive</button>
              ${dirText ? `<button class="coach-clear" id="coach-clear" type="button">Clear</button>` : ''}
            </div>
            <div class="coach-msg" id="coach-msg"></div>
          ` : `
            ${!dirText ? '<div class="coach-state">No directive set.</div>' : ''}
          `}
        </div>`;

      document.getElementById('replay-onboarding')?.addEventListener('click', () => {
        showOnboarding(a);
      });

      if (w.open) {
        const input = document.getElementById('coach-input');
        const pwInput = document.getElementById('coach-pw');
        const counter = document.getElementById('coach-len');
        // NOTE: don't pre-fill the textarea with the existing directive —
        // submissions always replace, so a blank textarea is the safer default.
        counter.textContent = String(input.value.length);
        input.addEventListener('input', () => { counter.textContent = String(input.value.length); });

        // Pre-fill password from sessionStorage so the coach doesn't have
        // to re-type on every directive submission. sessionStorage is per-tab
        // and clears when the tab closes — appropriate scope for a 33-min game.
        try {
          const cached = sessionStorage.getItem(`qa.password.${a.id}`);
          if (cached) pwInput.value = cached;
        } catch {}

        const msg = document.getElementById('coach-msg');
        document.getElementById('coach-save').addEventListener('click', async () => {
          const directive = input.value.trim();
          const password = pwInput.value;
          if (!directive) { msg.style.color = 'var(--danger)'; msg.textContent = 'Directive is empty.'; return; }
          if (!password) { msg.style.color = 'var(--danger)'; msg.textContent = 'Password required.'; return; }
          await sendCoach({ method: 'POST', body: { agentId: a.id, password, directive }, password });
        });
        const clearBtn = document.getElementById('coach-clear');
        clearBtn?.addEventListener('click', async () => {
          const password = pwInput.value;
          if (!password) {
            const m = document.getElementById('coach-msg');
            m.style.color = 'var(--danger)';
            m.textContent = 'Enter your password to clear the directive.';
            return;
          }
          if (!confirm('Clear the current directive? Your manager reverts to base personality + default behavior.')) return;
          await sendCoach({ method: 'DELETE', body: { agentId: a.id, password }, password });
        });
      }
    }

    async function sendCoach({ method, body, password }) {
      const msg = document.getElementById('coach-msg');
      msg.style.color = 'var(--text-muted)';
      msg.textContent = method === 'DELETE' ? 'Clearing…' : 'Saving…';
      try {
        const r = await fetch(`${ORCHESTRATOR_BASE}/api/directive`, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await r.json();
        if (r.ok) {
          // Cache the (now-validated) password so the next submit doesn't
          // require re-typing. Only on success — wrong passwords don't get cached.
          if (password && body.agentId) {
            try { sessionStorage.setItem(`qa.password.${body.agentId}`, password); } catch {}
          }
          msg.style.color = 'var(--success)';
          msg.textContent = method === 'DELETE' ? 'Cleared. Reloading…' : 'Saved. Reloading…';
          setTimeout(() => location.reload(), 800);
        } else {
          msg.style.color = 'var(--danger)';
          msg.textContent = data.error || `Request failed (${r.status})`;
        }
      } catch (err) {
        msg.style.color = 'var(--danger)';
        msg.textContent = 'Network error: ' + err.message;
      }
    }
    // ============================================================
    // Onboarding modal — fires after a successful first-time claim.
    // 5 steps walking through: welcome → game flow → coaching mechanics →
    // pages → pro tips. localStorage flag prevents re-showing for the
    // same agent. Closes → reloads the page into the coaching view.
    // ============================================================
    let onboardingStep = 1;
    const ONBOARDING_TOTAL = 5;
    let onboardingAgent = null;

    function showOnboarding(agent) {
      onboardingAgent = agent;
      onboardingStep = 1;
      const modal = document.getElementById('onboarding-modal');
      if (!modal) { finishOnboarding(); return; }
      modal.hidden = false;
      renderOnboardingStep();
    }

    function renderOnboardingStep() {
      const a = onboardingAgent;
      const progress = document.getElementById('onboarding-progress');
      const content = document.getElementById('onboarding-content');
      const backBtn = document.getElementById('onboarding-back');
      const nextBtn = document.getElementById('onboarding-next');
      if (!progress || !content || !backBtn || !nextBtn) return;

      // Progress dots
      let dots = '';
      for (let i = 1; i <= ONBOARDING_TOTAL; i++) {
        const cls = i < onboardingStep ? 'dot done' : i === onboardingStep ? 'dot active' : 'dot';
        dots += `<div class="${cls}"></div>`;
      }
      progress.innerHTML = dots;
      backBtn.disabled = (onboardingStep === 1);
      nextBtn.textContent = (onboardingStep === ONBOARDING_TOTAL) ? 'Got it, start coaching →' : 'Next →';

      // Step bodies
      const first = a.name.split(' ')[0];
      const traits = a.traits || {};
      const traitsLine = (typeof traits.aggression === 'number')
        ? `Aggression ${traits.aggression} · Greed ${traits.greed} · Caution ${traits.caution} · Loyalty ${traits.loyalty}`
        : '';
      if (onboardingStep === 1) {
        content.innerHTML = `
          <h2>🎉 You claimed ${escape(a.name)}.</h2>
          <p>You're now ${escape(first)}'s <b>life coach</b> for the next 8 hours.</p>
          <div class="persona-card">
            <div class="pc-name">${escape(a.name)}</div>
            <div class="pc-title">${escape(a.title || 'Mid-level Manager')}</div>
            ${traitsLine ? `<div>${escape(traitsLine)}</div>` : ''}
            ${a.backstory ? `<div style="margin-top:8px;">${escape(a.backstory)}</div>` : ''}
            ${a.quirk ? `<div class="pc-quirk">"${escape(a.quirk)}"</div>` : ''}
          </div>
          <p>${escape(first)} is an autonomous AI agent. You'll give them coaching directives; they'll decide how (or whether) to follow them.</p>
        `;
      } else if (onboardingStep === 2) {
        content.innerHTML = `
          <h2>How the game works</h2>
          <p>Quarterly Ascension runs for <b>60 ticks × 8 minutes ≈ 8 hours</b> — one full workday.</p>
          <ul>
            <li><b>5 managers act per tick</b>, in a fixed rotation. Your manager acts about 30 times across the game.</li>
            <li>Each action moves <b>prestige</b> (the leaderboard score) and <b>budget</b> ($DLBR on Stellar Testnet, settled on-chain).</li>
            <li>The game auto-starts <b>30 minutes</b> after the first claim opens the lobby — invite friends to coach the other 9 managers. The first person to claim a manager can also manually start the game.</li>
            <li><b>Highest prestige at tick 60 wins</b> and gets promoted to VP of Prestige.</li>
          </ul>
        `;
      } else if (onboardingStep === 3) {
        content.innerHTML = `
          <h2>Coaching mechanics</h2>
          <p>Submit short directives (up to 280 characters) any time during the game. ${escape(first)} reads each one and weighs it against their persona before acting.</p>
          <p><b>Three things can happen:</b></p>
          <div class="alignment-row"><b class="followed">✓ Followed</b><span>${escape(first)} did exactly what you said.</span></div>
          <div class="alignment-row"><b class="tilted">〰 Tilted</b><span>They took your direction but flavored it with their persona.</span></div>
          <div class="alignment-row"><b class="defied">✘ Defied</b><span>They ignored you and did their own thing.</span></div>
          <p style="margin-top:14px;">This is the whole point: you're an influence, not a remote control. The game's drama lives in the gap between your intent and the AI's interpretation.</p>
        `;
      } else if (onboardingStep === 4) {
        content.innerHTML = `
          <h2>Pages you'll use</h2>
          <a class="page-link" href="/?coach=${encodeURIComponent(a.id)}" target="_blank" rel="noopener">
            <b>📊 Dashboard</b>
            <div class="pl-desc">Live leaderboard, activity feed, on-chain settlements as they happen. Your manager's row stays highlighted.</div>
          </a>
          <a class="page-link" href="/agent.html?id=${encodeURIComponent(a.id)}" target="_blank" rel="noopener">
            <b>🎙 This page (Coach ${escape(first)})</b>
            <div class="pl-desc">Submit directives, see ${escape(first)}'s recent actions + suggested plays. You'll spend most of your coaching time here.</div>
          </a>
          <a class="page-link" href="/handbook.html" target="_blank" rel="noopener">
            <b>📖 Handbook</b>
            <div class="pl-desc">Full action catalog, combo plays, status effects, public tags, game calendar.</div>
          </a>
          <a class="page-link" href="/directives.html" target="_blank" rel="noopener">
            <b>📣 Life Coaching</b>
            <div class="pl-desc">Every coach's current directive + the alignment leaderboard (who's actually following whom).</div>
          </a>
        `;
      } else if (onboardingStep === 5) {
        content.innerHTML = `
          <h2>Pro tips</h2>
          <ul>
            <li><b>Suggested Actions</b> + <b>Strategic Directives</b> appear on this page above the directive box — click any of them to pre-fill the textarea with a smart play.</li>
            <li>You'll get <b>email updates</b> at ticks 15, 30, 45, and end-of-game. Check your inbox throughout the day.</li>
            <li>The <b>Board Strategy Review</b> at tick 30-34 is the highest-leverage window — submit aggressive directives then; everything doubles.</li>
            <li>Re-coaching is fine. Submit as many directives as you want.</li>
            <li>If your manager is stuck (low budget, bottom of pack), try a comeback play: <code>Hail Mary Idea</code> or <code>Boomerang</code>.</li>
          </ul>
          <p>That's it. Good luck. The audience came for the drama.</p>
        `;
      }
    }

    function finishOnboarding() {
      // Persist the "seen" flag so we don't pop the modal next visit.
      try { localStorage.setItem(`qa.onboarded.${agentId}`, '1'); } catch {}
      const modal = document.getElementById('onboarding-modal');
      if (modal) modal.hidden = true;
      // Reload the page into the coaching view (the claim succeeded; the
      // page needs to re-fetch agent state to render the coach panel).
      location.reload();
    }

    document.getElementById('onboarding-next')?.addEventListener('click', () => {
      if (onboardingStep < ONBOARDING_TOTAL) {
        onboardingStep += 1;
        renderOnboardingStep();
      } else {
        finishOnboarding();
      }
    });
    document.getElementById('onboarding-back')?.addEventListener('click', () => {
      if (onboardingStep > 1) {
        onboardingStep -= 1;
        renderOnboardingStep();
      }
    });
    document.getElementById('onboarding-skip')?.addEventListener('click', () => {
      finishOnboarding();
    });
  </script>
  <footer style="padding:10px 24px;background:#1c3a64;text-align:center;border-top:1px solid #0d1f3a;margin-top:40px;">
    <a href="https://github.com/briwylde08/quarterly-ascension" target="_blank" rel="noopener" style="color:#f1c40f;text-decoration:none;font-size:11px;letter-spacing:0.5px;">GitHub</a>
  </footer>
</body>
